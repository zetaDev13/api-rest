server:
  port: 8080

spring:
  application:
    name: zetasoft-api
  datasource:
    url: jdbc:h2:mem:apidb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  security:
    user:
      name: admin
      password: admin123

# JWT Configuration
jwt:
  secret: zetasoft-api-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

# OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.zetasoft.api: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
